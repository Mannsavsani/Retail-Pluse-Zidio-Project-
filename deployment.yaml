apiVersion: apps/v1
kind: Deployment
metadata:
  name: retailpulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retailpulse
  template:
    metadata:
      labels:
        app: retailpulse
    spec:
      containers:
        - name: retailpulse
          image: retailpulse:latest
          ports:
            - containerPort: 8501
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: retailpulse-service
spec:
  selector:
    app: retailpulse
  ports:
    - port: 80
      targetPort: 8501
  type: LoadBalancer